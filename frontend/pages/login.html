<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Login</title>
</head>
<body>
    <div class="d-flex justify-content-center align-items-center vh-100 p-3">
        <div class="card-login">
            <div class="d-flex flex-column">

                <h1 class="fw-semibold text-center text-white">Bem-vindo!</h1>

                <div class="d-flex justify-content-center gap-2 mb-3">
                    <span class="text-white"> Não tem conta ainda?</span>
                    <a href="./register.html" class="text-blue text-decoration-none"> Registre-se</a>
                </div>

            </div>
            
            <form action="">
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input  class="form-control" type="text" name="username" placeholder="Usuário">
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="bi bi-lock "></i></span>
                    <input class="form-control" type="password" name="username" placeholder="Senha">
                </div>

                <div class="d-flex justify-content-between align-items-center">
                    <a href="" class="text-white small text-decoration-none mb-2">Esqueceu a senha?</a>
                </div>

                <button class="btn btn-light w-100 text-black">Entrar</button>
                
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
