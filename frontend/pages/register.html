<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Registre-se</title>
</head>
<body>
    <div class="d-flex justify-content-center align-items-center vh-100 p-3">
        <div class="card-login">
    
                <h1 class="fw-semibold text-center text-white mb-3">Registre-se</h1>

            <form action="">
                <div class="mb-3 d-flex flex-column">
                    <label class="text-white" for="name">Nome</label>
                    <input class="form-control input-registro" type="text" name="username" placeholder="Nome">
                </div>

                <div class="mb-3 d-flex flex-column">
                    <label class="text-white" for="E-mail">E-mail</label>
                    <input  class="form-control input-registro" type="text" name="username" placeholder="E-mail">
                </div>

                <div class="mb-3 d-flex flex-column">
                    <label class="text-white" for="password">Senha</label>
                    <input  class="form-control input-registro" type="password" name="username" placeholder="Senha">
                </div>

                <div class="mb-3 d-flex flex-column">
                    <label class="text-white" for="password">Confirme a senha</label>
                    <input class="form-control input-registro" type="password" name="username" placeholder="Confirme a Senha">
                </div>

               

                <button class="btn btn-light w-100 text-black">Criar nova conta</button>
                
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
