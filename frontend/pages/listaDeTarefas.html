<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Lista de tarefas</title>
</head>

<body>
    <div class="d-flex justify-content-center align-items-center flex-column vh-100 p-3">
        
        <div class="toDo-card d-flex flex-column align-items-center">
            <h1 class="fw-semibold text-center text-white mb-4">Lista de tarefas</h1>
            <div class="new-Task d-flex gap-2">
                <input id="task-input" class="form-control" type="text" placeholder="Adicione sua tarefa">
                <button id="add-task-btn" class="btn btn-primary"><i class="bi bi-plus"></i></button>
            </div>

            <ul id="task-list" class="list-group d-flex flex-column mt-2 gap-2">
                
            </ul>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

        <script src="../js/script.js"></script>
</body>

</html>
